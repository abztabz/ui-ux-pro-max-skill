<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="108 Media creative work">
  <defs>
    <linearGradient id="h-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf6ef"/><stop offset="0.5" stop-color="#f6f4f7"/><stop offset="1" stop-color="#eef3f6"/>
    </linearGradient>
    <linearGradient id="h-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7b15a"/><stop offset="0.4" stop-color="#f0883e"/><stop offset="0.75" stop-color="#ff5d4d"/><stop offset="1" stop-color="#ff7a8a"/>
    </linearGradient>
    <radialGradient id="h-b1" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffcf9e" stop-opacity="0.9"/><stop offset="1" stop-color="#ffcf9e" stop-opacity="0"/></radialGradient>
    <radialGradient id="h-b2" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffc1c8" stop-opacity="0.85"/><stop offset="1" stop-color="#ffc1c8" stop-opacity="0"/></radialGradient>
    <radialGradient id="h-b3" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#bcd6e6" stop-opacity="0.8"/><stop offset="1" stop-color="#bcd6e6" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="560" rx="0" fill="url(#h-bg)"/>
  <ellipse cx="250" cy="150" rx="360" ry="300" fill="url(#h-b1)"/>
  <ellipse cx="980" cy="430" rx="380" ry="320" fill="url(#h-b2)"/>
  <ellipse cx="980" cy="120" rx="280" ry="240" fill="url(#h-b3)"/>
  <!-- floating cards -->
  <g>
    <rect x="120" y="150" width="300" height="200" rx="18" fill="#ffffff" stroke="#00000010" transform="rotate(-6 270 250)"/>
    <rect x="470" y="120" width="300" height="320" rx="20" fill="#ffffff" stroke="#00000012"/>
    <rect x="800" y="160" width="300" height="200" rx="18" fill="#ffffff" stroke="#00000010" transform="rotate(6 950 260)"/>
  </g>
  <!-- center card content: big aperture -->
  <g transform="translate(620 280) scale(1.55) translate(-50 -50)" fill="none" stroke="url(#h-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="50" r="45" stroke-width="2.2" opacity="0.5"/>
    <line x1="50" y1="5" x2="62.99" y2="42.5"/><line x1="88.97" y1="27.5" x2="62.99" y2="57.5"/><line x1="88.97" y1="72.5" x2="50" y2="65"/><line x1="50" y1="95" x2="37.01" y2="57.5"/><line x1="11.03" y1="72.5" x2="37.01" y2="42.5"/><line x1="11.03" y1="27.5" x2="50" y2="35"/>
    <path d="M 50 35 L 62.99 42.5 L 62.99 57.5 L 50 65 L 37.01 57.5 L 37.01 42.5 Z" stroke-width="3.4"/>
  </g>
  <!-- left card: type sample -->
  <g transform="rotate(-6 270 250)">
    <rect x="150" y="185" width="120" height="12" rx="6" fill="#1d1d1f"/>
    <rect x="150" y="210" width="200" height="8" rx="4" fill="#c9c9cf"/>
    <rect x="150" y="226" width="170" height="8" rx="4" fill="#d8d8dd"/>
    <circle cx="360" cy="300" r="26" fill="url(#h-grad)"/>
  </g>
  <!-- right card: equalizer -->
  <g transform="rotate(6 950 260)" fill="url(#h-grad)">
    <rect x="850" y="250" width="14" height="50" rx="4"/><rect x="874" y="220" width="14" height="80" rx="4"/><rect x="898" y="200" width="14" height="100" rx="4"/><rect x="922" y="235" width="14" height="65" rx="4"/><rect x="946" y="210" width="14" height="90" rx="4"/><rect x="970" y="255" width="14" height="45" rx="4"/><rect x="994" y="225" width="14" height="75" rx="4"/><rect x="1018" y="245" width="14" height="55" rx="4"/>
  </g>
