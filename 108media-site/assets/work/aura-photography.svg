<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aura product photography">
  <defs>
    <linearGradient id="ap-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe3d6"/><stop offset="1" stop-color="#d8c3b4"/>
    </linearGradient>
    <linearGradient id="ap-bottle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e9d3c6"/>
    </linearGradient>
    <radialGradient id="ap-sh" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9a7c6a" stop-opacity="0.5"/><stop offset="1" stop-color="#9a7c6a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="550" fill="url(#ap-bg)"/>
  <!-- soft window light -->
  <polygon points="120,0 360,0 230,330 60,330" fill="#ffffff" opacity="0.25"/>
  <ellipse cx="400" cy="430" rx="190" ry="40" fill="url(#ap-sh)"/>
  <!-- pedestal -->
  <rect x="250" y="360" width="300" height="14" rx="7" fill="#c4ab9b"/>
  <!-- bottle -->
  <rect x="356" y="170" width="88" height="200" rx="20" fill="url(#ap-bottle)"/>
  <rect x="380" y="142" width="40" height="36" rx="7" fill="#cdb1a1"/>
  <rect x="372" y="250" width="56" height="78" rx="8" fill="#22323a" opacity="0.12"/>
  <line x1="400" y1="256" x2="400" y2="322" stroke="#22323a" stroke-opacity="0.22"/>
  <text x="400" y="294" text-anchor="middle" font-family="Sora, Arial, sans-serif" font-size="11" letter-spacing="4" fill="#22323a" opacity="0.5">AURA</text>
  <!-- botanical accent -->
  <path d="M250 360 q -10 -70 -46 -96 q 30 8 46 40 q 6 -34 30 -52 q -8 36 -30 56 Z" fill="#9bb7a4" opacity="0.85"/>
  <text x="40" y="520" font-family="Sora, Arial, sans-serif" font-size="13" letter-spacing="5" fill="#7a6757">PRODUCT &amp; LIFESTYLE PHOTOGRAPHY</text>
</svg>
