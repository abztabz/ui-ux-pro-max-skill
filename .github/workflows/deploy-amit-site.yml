name: Deploy Amit Shrestha site to GitHub Pages

# Publishes the amit-leadership-site/ folder to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that, every push that touches the site
# (or a manual run via the Actions tab) redeploys automatically.

on:
  push:
    branches:
      - claude/amit-leadership-coach-site-jjlvx5
      - main
    paths:
      - 'amit-leadership-site/**'
      - '.github/workflows/deploy-amit-site.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: amit-leadership-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
