backend:
  name: git-gateway
  branch: main

# Where uploaded images go (repo path) and how they're referenced on the site
media_folder: "docs/uploads"
public_folder: "/uploads"

site_url: https://amitshresthaleadershipcoach.netlify.app
display_url: https://amitshresthaleadershipcoach.netlify.app

collections:
  - name: events
    label: "Events"
    description: "Upcoming events shown on the Events page."
    files:
      - name: events
        label: "Events list"
        file: "docs/data/events.json"
        format: json
        fields:
          - label: "Events"
            name: events
            widget: list
            summary: "{{fields.month}} {{fields.day}} {{fields.year}} — {{fields.title}}"
            fields:
              - { label: "Month (e.g. Mar)", name: month, widget: string }
              - { label: "Day (e.g. 14)", name: day, widget: string }
              - { label: "Year (e.g. 2026)", name: year, widget: string }
              - { label: "Type (Keynote / Workshop / Webinar / Training)", name: type, widget: string }
              - { label: "Title", name: title, widget: string }
              - { label: "Details (one per line: venue, format, etc.)", name: meta, widget: list, field: { label: Detail, name: detail, widget: string } }
              - { label: "Button label", name: cta, widget: string, default: "Reserve a Spot →" }
              - { label: "Button link (page or full URL)", name: link, widget: string, default: "consultation.html" }

  - name: testimonials
    label: "Testimonials"
    description: "Quotes shown on the Home page."
    files:
      - name: testimonials
        label: "Testimonials list"
        file: "docs/data/testimonials.json"
        format: json
        fields:
          - label: "Testimonials"
            name: testimonials
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: "Quote", name: quote, widget: text }
              - { label: "Name", name: name, widget: string }
              - { label: "Role / Institution", name: role, widget: string }

  - name: essays
    label: "Insights (Essays)"
    description: "Article cards shown on the Insights page."
    files:
      - name: essays
        label: "Essays list"
        file: "docs/data/essays.json"
        format: json
        fields:
          - label: "Essays"
            name: essays
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: "Category", name: category, widget: string }
              - { label: "Title", name: title, widget: string }
              - { label: "Excerpt", name: excerpt, widget: text }
              - { label: "Read time (e.g. 6 min read)", name: read, widget: string }
