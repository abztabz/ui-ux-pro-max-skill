<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Amit Shrestha — Content Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#16294D; --gold:#9A6A3C; --paper:#F7F5EF; --line:#E2DED4; --card:#fff; --mute:#6B7589; }
  *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55}
  header{background:var(--ink);color:#fff;padding:1rem 1.4rem;display:flex;justify-content:space-between;align-items:center}
  header b{font-family:'Playfair Display',serif;font-size:1.2rem}
  header .who{font-size:.85rem;color:#9DA8BD}
  .wrap{max-width:820px;margin:0 auto;padding:1.6rem 1.4rem 5rem}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1.4rem;margin-bottom:1.4rem}
  h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin:.2rem 0 1rem}
  label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--mute);margin:.7rem 0 .3rem}
  input,textarea{width:100%;padding:.7rem .85rem;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fff;color:var(--ink)}
  textarea{min-height:80px;resize:vertical}
  input:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px}
  .entry{border:1px solid var(--line);border-radius:10px;padding:1rem;margin-bottom:1rem;background:#fcfbf9;position:relative}
  .entry .rm{position:absolute;top:.6rem;right:.6rem;background:none;border:1px solid var(--line);border-radius:6px;color:#b4453a;cursor:pointer;font-size:.78rem;padding:.25rem .5rem}
  .btn{display:inline-flex;align-items:center;gap:.4rem;border:none;border-radius:100px;padding:.7rem 1.3rem;font:inherit;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--ink);color:#fff}
  .btn-gold{background:#E3A92E;color:#1A130A}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-top:1rem}
  .status{font-size:.9rem;margin-left:.4rem}
  .status.ok{color:#2e7d51}.status.err{color:#b4453a}
  .hide{display:none}
  .login{max-width:380px;margin:8vh auto;text-align:center}
  .login .card{padding:2rem}
  .muted{color:var(--mute);font-size:.9rem}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="card">
    <b style="font-family:'Playfair Display',serif;font-size:1.3rem">Amit Shrestha — Admin</b>
    <p class="muted">Enter your password to edit the site.</p>
    <label for="pw" style="text-align:left">Password</label>
    <input id="pw" type="password" autocomplete="current-password" />
    <div class="row" style="justify-content:center">
      <button class="btn btn-primary" id="loginBtn">Log in</button>
    </div>
    <p id="loginMsg" class="status err"></p>
  </div>
</div>

<!-- ADMIN -->
<div id="app" class="hide">
  <header>
    <b>Content Admin</b>
    <span class="who">Signed in · <a href="#" id="logout" style="color:#E3A92E">Log out</a></span>
  </header>
  <div class="wrap" id="sections"></div>
</div>

<script>
const API = "/.netlify/functions/save-content";
let PASSWORD = "";

const SCHEMA = {
  events: {
    label: "Events", arrayKey: "events", file: "data/events.json",
    fields: [
      {k:"month",l:"Month (e.g. Mar)"},{k:"day",l:"Day (e.g. 14)"},{k:"year",l:"Year"},
      {k:"type",l:"Type (Keynote / Workshop / Webinar / Training)"},{k:"title",l:"Title",full:true},
      {k:"meta",l:"Details — one per line (venue, format…)",type:"lines",full:true},
      {k:"cta",l:"Button label"},{k:"link",l:"Button link"}
    ],
    blank: {month:"",day:"",year:"2026",type:"",title:"",meta:[],cta:"Reserve a Spot →",link:"consultation.html"}
  },
  testimonials: {
    label: "Testimonials", arrayKey: "testimonials", file: "data/testimonials.json",
    fields: [{k:"quote",l:"Quote",type:"textarea",full:true},{k:"name",l:"Name"},{k:"role",l:"Role / Institution"}],
    blank: {quote:"",name:"",role:""}
  },
  essays: {
    label: "Insights (Essays)", arrayKey: "essays", file: "data/essays.json",
    fields: [{k:"category",l:"Category"},{k:"read",l:"Read time (e.g. 6 min read)"},{k:"title",l:"Title",full:true},{k:"excerpt",l:"Excerpt",type:"textarea",full:true}],
    blank: {category:"",title:"",excerpt:"",read:""}
  }
};

const state = {}; // type -> array of items

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

async function loadAll(){
  for (const type of Object.keys(SCHEMA)){
    try{
      const r = await fetch("../"+SCHEMA[type].file, {cache:"no-cache"});
      const j = r.ok ? await r.json() : {};
      state[type] = Array.isArray(j[SCHEMA[type].arrayKey]) ? j[SCHEMA[type].arrayKey] : [];
    }catch{ state[type] = []; }
  }
  renderSections();
}

function renderSections(){
  const root = document.getElementById("sections");
  root.innerHTML = "";
  for (const type of Object.keys(SCHEMA)){
    const sc = SCHEMA[type];
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<h2>${esc(sc.label)}</h2><div data-entries></div>
      <div class="row">
        <button class="btn btn-ghost" data-add>+ Add ${esc(sc.label.replace(/s$/,'').replace(' (Essays)',''))}</button>
        <button class="btn btn-gold" data-save>Save ${esc(sc.label)}</button>
        <span class="status" data-status></span>
      </div>`;
    const entries = card.querySelector("[data-entries]");
    state[type].forEach((item,i)=> entries.appendChild(entryEl(type,item,i)));
    card.querySelector("[data-add]").onclick = ()=>{ state[type].push(JSON.parse(JSON.stringify(sc.blank))); renderSections(); };
    card.querySelector("[data-save]").onclick = ()=> save(type, card.querySelector("[data-status]"));
    root.appendChild(card);
  }
}

function entryEl(type,item,idx){
  const sc = SCHEMA[type];
  const el = document.createElement("div");
  el.className = "entry";
  const fieldsHtml = sc.fields.map(f=>{
    const val = f.type==="lines" ? (Array.isArray(item[f.k])?item[f.k].join("\n"):"") : (item[f.k]||"");
    const input = (f.type==="textarea"||f.type==="lines")
      ? `<textarea data-k="${f.k}" data-lines="${f.type==="lines"?1:0}">${esc(val)}</textarea>`
      : `<input data-k="${f.k}" value="${esc(val)}" />`;
    return `<div${f.full?' style="grid-column:1/-1"':''}><label>${esc(f.l)}</label>${input}</div>`;
  }).join("");
  el.innerHTML = `<button class="rm" title="Remove">Remove</button><div class="grid2">${fieldsHtml}</div>`;
  el.querySelector(".rm").onclick = ()=>{ state[type].splice(idx,1); renderSections(); };
  el.querySelectorAll("[data-k]").forEach(inp=>{
    inp.addEventListener("input", ()=>{
      const k = inp.getAttribute("data-k");
      if (inp.getAttribute("data-lines")==="1") item[k] = inp.value.split("\n").map(s=>s.trim()).filter(Boolean);
      else item[k] = inp.value;
    });
  });
  return el;
}

async function save(type, statusEl){
  statusEl.textContent = "Saving…"; statusEl.className = "status";
  const payload = { password: PASSWORD, type, data: { [SCHEMA[type].arrayKey]: state[type] } };
  try{
    const r = await fetch(API, {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(payload)});
    const j = await r.json().catch(()=>({}));
    if (r.ok && j.ok){ statusEl.textContent = "✓ "+(j.message||"Saved"); statusEl.className="status ok"; }
    else { statusEl.textContent = "✕ "+(j.error||("Error "+r.status)); statusEl.className="status err";
      if (r.status===401){ PASSWORD=""; document.getElementById("app").classList.add("hide"); document.getElementById("login").classList.remove("hide"); }
    }
  }catch(e){ statusEl.textContent = "✕ Network error"; statusEl.className="status err"; }
}

function doLogin(){
  const pw = document.getElementById("pw").value.trim();
  const msg = document.getElementById("loginMsg");
  if (!pw){ msg.textContent="Please enter your password."; return; }
  PASSWORD = pw; msg.textContent = "";
  document.getElementById("login").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  loadAll();
}
document.getElementById("loginBtn").onclick = doLogin;
document.getElementById("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
document.getElementById("logout").onclick = (e)=>{ e.preventDefault(); PASSWORD=""; location.reload(); };
</script>
</body>
</html>
