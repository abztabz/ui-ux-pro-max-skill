<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Amit Shrestha — Content Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#16294D; --gold:#9A6A3C; --paper:#F7F5EF; --line:#E2DED4; --card:#fff; --mute:#6B7589; }
  *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55}
  header{background:var(--ink);color:#fff;padding:1rem 1.4rem;display:flex;justify-content:space-between;align-items:center}
  header b{font-family:'Playfair Display',serif;font-size:1.2rem}
  header .who{font-size:.85rem;color:#9DA8BD}
  .wrap{max-width:820px;margin:0 auto;padding:1.6rem 1.4rem 5rem}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1.4rem;margin-bottom:1.4rem}
  h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin:.2rem 0 1rem}
  label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--mute);margin:.7rem 0 .3rem}
  input,textarea,select{width:100%;padding:.7rem .85rem;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fff;color:var(--ink)}
  textarea{min-height:80px;resize:vertical}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--gold);outline-offset:1px}
  .entry{border:1px solid var(--line);border-radius:10px;padding:1rem;margin-bottom:1rem;background:#fcfbf9;position:relative}
  .entry .rm{position:absolute;top:.6rem;right:.6rem;background:none;border:1px solid var(--line);border-radius:6px;color:#b4453a;cursor:pointer;font-size:.78rem;padding:.25rem .5rem}
  .btn{display:inline-flex;align-items:center;gap:.4rem;border:none;border-radius:100px;padding:.7rem 1.3rem;font:inherit;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--ink);color:#fff}
  .btn-gold{background:#E3A92E;color:#1A130A}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-top:1rem}
  .status{font-size:.9rem;margin-left:.4rem}
  .status.ok{color:#2e7d51}.status.err{color:#b4453a}
  .hide{display:none}
  .login{max-width:380px;margin:8vh auto;text-align:center}
  .login .card{padding:2rem}
  .muted{color:var(--mute);font-size:.9rem}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}
  .admin-nav{display:flex;flex-wrap:wrap;gap:.4rem;margin:-.4rem 0 1.4rem;position:sticky;top:0;z-index:5;background:var(--paper);padding:.7rem 0}
  .admin-tab{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:100px;padding:.5rem 1.05rem;font:inherit;font-weight:600;font-size:.9rem;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
  .admin-tab:hover{border-color:var(--gold)}
  .admin-tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .imgfield{margin-top:.3rem}
  .imgprev{max-width:180px;width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:10px;border:1px solid var(--line);display:block;margin-bottom:.5rem;background:#f1eee7}
  .btn-ghost.btn-sm{padding:.5rem 1rem;font-size:.9rem}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="card">
    <b style="font-family:'Playfair Display',serif;font-size:1.3rem">Amit Shrestha — Admin</b>
    <p class="muted">Enter your password to edit the site.</p>
    <label for="pw" style="text-align:left">Password</label>
    <input id="pw" type="password" autocomplete="current-password" />
    <div class="row" style="justify-content:center">
      <button class="btn btn-primary" id="loginBtn">Log in</button>
    </div>
    <p id="loginMsg" class="status err"></p>
  </div>
</div>

<!-- ADMIN -->
<div id="app" class="hide">
  <header>
    <b>Content Admin</b>
    <span class="who">Signed in · <a href="#" id="logout" style="color:#E3A92E">Log out</a></span>
  </header>
  <div class="wrap" id="sections"></div>
</div>

<script>
const API = "/.netlify/functions/save-content";

const state = {}; // type -> array of items

let imagesState = {}; // named site images, e.g. { portrait: "images/uploads/..." }

let seoActive = "home";
const PAGE_LABELS = {

  "about.title":"About — Headline","about.lede":"About — Intro paragraph","about.story":"About — Story paragraph","about.quote":"About — Pull quote",
  "about.story_eyebrow":"About — Story: kicker","about.story_heading":"About — Story: heading","about.tl1_tag":"About — Timeline 1: tag","about.tl1_title":"About — Timeline 1: title","about.tl1_text":"About — Timeline 1: text","about.tl2_tag":"About — Timeline 2: tag","about.tl2_title":"About — Timeline 2: title","about.tl2_text":"About — Timeline 2: text","about.tl3_tag":"About — Timeline 3: tag","about.tl3_title":"About — Timeline 3: title","about.tl3_text":"About — Timeline 3: text","about.tl4_tag":"About — Timeline 4: tag","about.tl4_title":"About — Timeline 4: title","about.tl4_text":"About — Timeline 4: text","about.cred_eyebrow":"About — Credentials: kicker","about.cred_heading":"About — Credentials: heading","about.cred1_title":"About — Credential 1: title","about.cred1_text":"About — Credential 1: text","about.cred2_title":"About — Credential 2: title","about.cred2_text":"About — Credential 2: text","about.cred3_title":"About — Credential 3: title","about.cred3_text":"About — Credential 3: text","about.cred4_title":"About — Credential 4: title","about.cred4_text":"About — Credential 4: text","about.cred5_title":"About — Credential 5: title","about.cred5_text":"About — Credential 5: text","about.cred6_title":"About — Credential 6: title","about.cred6_text":"About — Credential 6: text","about.cta_eyebrow":"About — Call-to-action: kicker","about.cta_title":"About — Call-to-action: heading","about.cta_text":"About — Call-to-action: text",

  "programs.p1_tag":"Programs — P1: tag","programs.p1_title":"Programs — P1: title","programs.p1_intro1":"Programs — P1: intro 1","programs.p1_intro2":"Programs — P1: intro 2","programs.p1_subhead":"Programs — P1: subhead","programs.p1_m1":"Programs — P1: master 1","programs.p1_m2":"Programs — P1: master 2","programs.p1_m3":"Programs — P1: master 3","programs.p1_m4":"Programs — P1: master 4","programs.p1_m5":"Programs — P1: master 5","programs.p1_m6":"Programs — P1: master 6","programs.p1_m7":"Programs — P1: master 7","programs.p1_m8":"Programs — P1: master 8","programs.p1_meta1_l":"Programs — P1: meta1 label","programs.p1_meta1_v":"Programs — P1: meta1 value","programs.p1_meta2_l":"Programs — P1: meta2 label","programs.p1_meta2_v":"Programs — P1: meta2 value","programs.p1_meta3_l":"Programs — P1: meta3 label","programs.p1_meta3_v":"Programs — P1: meta3 value","programs.p2_tag":"Programs — P2: tag","programs.p2_title":"Programs — P2: title","programs.p2_intro1":"Programs — P2: intro 1","programs.p2_intro2":"Programs — P2: intro 2","programs.p2_subhead":"Programs — P2: subhead","programs.p2_f1_t":"Programs — P2: focus 1 title","programs.p2_f1_p":"Programs — P2: focus 1 text","programs.p2_f2_t":"Programs — P2: focus 2 title","programs.p2_f2_p":"Programs — P2: focus 2 text","programs.p2_f3_t":"Programs — P2: focus 3 title","programs.p2_f3_p":"Programs — P2: focus 3 text","programs.p2_f4_t":"Programs — P2: focus 4 title","programs.p2_f4_p":"Programs — P2: focus 4 text","programs.p2_f5_t":"Programs — P2: focus 5 title","programs.p2_f5_p":"Programs — P2: focus 5 text","programs.p2_f6_t":"Programs — P2: focus 6 title","programs.p2_f6_p":"Programs — P2: focus 6 text","programs.cta_eyebrow":"Programs — CTA: kicker","programs.cta_title":"Programs — CTA: heading","programs.cta_text":"Programs — CTA: text",
  "services.title":"Services — Headline","services.lede":"Services — Intro paragraph",
  "services.s1_title":"Services — S1: title","services.s1_lead":"Services — S1: lead","services.s1_desc":"Services — S1: description","services.s1_o1":"Services — S1: outcome 1","services.s1_o2":"Services — S1: outcome 2","services.s1_o3":"Services — S1: outcome 3","services.s1_o4":"Services — S1: outcome 4","services.s1_o5":"Services — S1: outcome 5","services.s1_c1":"Services — S1: chip 1","services.s1_c2":"Services — S1: chip 2","services.s1_c3":"Services — S1: chip 3","services.s1_c4":"Services — S1: chip 4","services.s1_c5":"Services — S1: chip 5","services.s2_title":"Services — S2: title","services.s2_lead":"Services — S2: lead","services.s2_desc":"Services — S2: description","services.s2_o1":"Services — S2: outcome 1","services.s2_o2":"Services — S2: outcome 2","services.s2_o3":"Services — S2: outcome 3","services.s2_o4":"Services — S2: outcome 4","services.s2_o5":"Services — S2: outcome 5","services.s2_c1":"Services — S2: chip 1","services.s2_c2":"Services — S2: chip 2","services.s2_c3":"Services — S2: chip 3","services.s2_c4":"Services — S2: chip 4","services.s3_title":"Services — S3: title","services.s3_lead":"Services — S3: lead","services.s3_desc":"Services — S3: description","services.s3_o1":"Services — S3: outcome 1","services.s3_o2":"Services — S3: outcome 2","services.s3_o3":"Services — S3: outcome 3","services.s3_o4":"Services — S3: outcome 4","services.s3_o5":"Services — S3: outcome 5","services.s3_c1":"Services — S3: chip 1","services.s3_c2":"Services — S3: chip 2","services.s3_c3":"Services — S3: chip 3","services.s3_c4":"Services — S3: chip 4","services.cta_eyebrow":"Services — CTA: kicker","services.cta_title":"Services — CTA: heading","services.cta_text":"Services — CTA: text",
  "events.title":"Events — Headline","events.lede":"Events — Intro paragraph",
  "events.upcoming_eyebrow":"Events — Upcoming: kicker","events.upcoming_heading":"Events — Upcoming: heading","events.invite_n":"Events — Invite: kicker","events.invite_title":"Events — Invite: title","events.invite_text":"Events — Invite: text","events.invite_go":"Events — Invite: button","events.subscribe_n":"Events — Subscribe: kicker","events.subscribe_title":"Events — Subscribe: title","events.subscribe_text":"Events — Subscribe: text","events.subscribe_go":"Events — Subscribe: button","events.cta_eyebrow":"Events — CTA: kicker","events.cta_title":"Events — CTA: heading","events.cta_text":"Events — CTA: text",
  "consultation.title":"Contact — Headline","consultation.lede":"Contact — Intro paragraph",
  "consultation.reach1_label":"Contact — Reach #1: heading","consultation.reach1_text":"Contact — Reach #1: description",
  "consultation.reach2_label":"Contact — Reach #2: heading","consultation.reach2_text":"Contact — Reach #2: description",
  "consultation.reach3_label":"Contact — Reach #3: heading","consultation.reach3_text":"Contact — Reach #3: description",
  "consultation.reach4_label":"Contact — Reach #4: heading","consultation.reach4_text":"Contact — Reach #4: description",
  "consultation.quote":"Contact — Pull quote",
  "insights.title":"Insights — Headline","insights.lede":"Insights — Intro paragraph",
  "insights.news_eyebrow":"Insights — Newsletter: kicker","insights.news_heading":"Insights — Newsletter: heading","insights.news_text":"Insights — Newsletter: text"
};

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

async function loadAll(){
  for (const type of Object.keys(SCHEMA)){
    try{
      const r = await fetch("../"+SCHEMA[type].file, {cache:"no-cache"});
      const j = r.ok ? await r.json() : {};
      state[type] = Array.isArray(j[SCHEMA[type].arrayKey]) ? j[SCHEMA[type].arrayKey] : [];
    }catch{ state[type] = []; }
  }
  try{
    const r = await fetch("../data/pages.json", {cache:"no-cache"});
    pagesState = r.ok ? await r.json() : {};
  }catch{ pagesState = {}; }
  try{
    const r = await fetch("../data/images.json", {cache:"no-cache"});
    imagesState = r.ok ? await r.json() : {};
  }catch{ imagesState = {}; }
  try{
    const r = await fetch("../data/seo.json", {cache:"no-cache"});
    seoState = r.ok ? await r.json() : {};
  }catch{ seoState = {}; }
  SEO_PAGES.forEach(p=>{ if(!seoState[p.k] || typeof seoState[p.k]!=="object") seoState[p.k] = {}; });
  renderSections();
}

// The admin is divided into "pages" (tabs), one section at a time, so it stays
// tidy instead of one long scroll. Switching tabs keeps any in-progress edits
// (they live in state/pagesState/imagesState until you Save).
const PAGES = [
  { key: "events",       label: "Events" },
  { key: "testimonials", label: "Testimonials" },
  { key: "essays",       label: "Insights" },
  { key: "quiz",         label: "Quiz" },
  { key: "photos",       label: "Photos" },
  { key: "pages",        label: "Page Text" },
  { key: "seo",          label: "SEO" },
];
let activePage = "events";

function listCard(type){
  const sc = SCHEMA[type];
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h2>${esc(sc.label)}</h2><div data-entries></div>
    <div class="row">
      <button class="btn btn-ghost" data-add>+ Add ${esc(sc.label.replace(/s$/,'').replace(' (Essays)',''))}</button>
      <button class="btn btn-gold" data-save>Save ${esc(sc.label)}</button>
      <span class="status" data-status></span>
    </div>`;
  const entries = card.querySelector("[data-entries]");
  state[type].forEach((item,i)=> entries.appendChild(entryEl(type,item,i)));
  card.querySelector("[data-add]").onclick = ()=>{ state[type].push(JSON.parse(JSON.stringify(sc.blank))); renderSections(); };
  card.querySelector("[data-save]").onclick = ()=> save(type, card.querySelector("[data-status]"));
  return card;
}

function renderSections(){
  const root = document.getElementById("sections");
  root.innerHTML = "";

  const nav = document.createElement("div");
  nav.className = "admin-nav";
  PAGES.forEach(p=>{
    const b = document.createElement("button");
    b.className = "admin-tab" + (p.key===activePage ? " active" : "");
    b.textContent = p.label;
    b.onclick = ()=>{ activePage = p.key; renderSections(); window.scrollTo(0,0); };
    nav.appendChild(b);
  });
  root.appendChild(nav);

  if (activePage === "photos")      root.appendChild(photosCard());
  else if (activePage === "pages")  root.appendChild(pageTextCard());
  else if (activePage === "seo")    root.appendChild(seoCard());
  else                              root.appendChild(listCard(activePage));
}

const PAGE_TEXT_PAGES = [
  {k:"home",l:"Home"},{k:"about",l:"About"},{k:"programs",l:"Programs"},
  {k:"services",l:"Services"},{k:"events",l:"Events"},{k:"consultation",l:"Consultation"},{k:"insights",l:"Insights"}
];
let pageTextActive = "home";

function pageTextCard(){
  const card=document.createElement("div"); card.className="card";
  const h=document.createElement("h2"); h.textContent="Page Text";
  const note=document.createElement("p"); note.className="muted"; note.style.margin="-.4rem 0 1rem";
  note.innerHTML="Headlines and intro text across the site. Wrap a word in &lt;em&gt;…&lt;/em&gt; to make it gold. Pick a page, edit, then Save.";
  const lblPick=document.createElement("label"); lblPick.textContent="Page";
  const sel=document.createElement("select");
  PAGE_TEXT_PAGES.forEach(p=>{ const o=document.createElement("option"); o.value=p.k; o.textContent=p.l; if(p.k===pageTextActive)o.selected=true; sel.appendChild(o); });
  const fieldsWrap=document.createElement("div"); fieldsWrap.style.marginTop="1rem";
  const status=document.createElement("span"); status.className="status";

  function renderFields(){
    fieldsWrap.innerHTML="";
    Object.keys(PAGE_LABELS).filter(k=> k.split(".")[0]===pageTextActive).forEach(k=>{
      const block=document.createElement("div"); block.style.marginBottom=".9rem";
      const lab=document.createElement("label"); lab.textContent=PAGE_LABELS[k].replace(/^[^—]*—\s*/,""); block.appendChild(lab);
      const ta=document.createElement("textarea"); ta.value = pagesState[k]!=null ? pagesState[k] : "";
      ta.addEventListener("input", ()=>{ pagesState[k]=ta.value; });
      block.appendChild(ta);
      fieldsWrap.appendChild(block);
    });
  }
  sel.addEventListener("change", ()=>{ pageTextActive=sel.value; renderFields(); });
  renderFields();

  const row=document.createElement("div"); row.className="row";
  const saveBtn=document.createElement("button"); saveBtn.className="btn btn-gold"; saveBtn.textContent="Save Page Text"; saveBtn.onclick=()=>savePages(status);
  row.append(saveBtn, status);

  card.append(h, note, lblPick, sel, fieldsWrap, row);
  return card;
}

async function savePages(statusEl){
  statusEl.textContent="Saving…"; statusEl.className="status";
  try{
    const r = await fetch(API, {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({password:PASSWORD, type:"pages", data: pagesState})});
    const j = await r.json().catch(()=>({}));
    if (r.ok && j.ok){ statusEl.textContent="✓ "+(j.message||"Saved"); statusEl.className="status ok"; }
    else { statusEl.textContent="✕ "+(j.error||("Error "+r.status)); statusEl.className="status err";
      if (r.status===401){ PASSWORD=""; document.getElementById("app").classList.add("hide"); document.getElementById("login").classList.remove("hide"); } }
  }catch(e){ statusEl.textContent="✕ Network error"; statusEl.className="status err"; }
}

function seoCard(){
  const card=document.createElement("div"); card.className="card";
  const h=document.createElement("h2"); h.textContent="SEO";
  const note=document.createElement("p"); note.className="muted"; note.style.margin="-.4rem 0 1rem";
  note.textContent="Search-engine settings, per page. Anything you fill in overrides the built-in default; leave a field blank to keep the default. Pick a page, edit, then Save.";
  const lblPick=document.createElement("label"); lblPick.textContent="Page";
  const sel=document.createElement("select");
  SEO_PAGES.forEach(p=>{ const o=document.createElement("option"); o.value=p.k; o.textContent=p.l; if(p.k===seoActive)o.selected=true; sel.appendChild(o); });
  const fieldsWrap=document.createElement("div"); fieldsWrap.style.marginTop="1rem";
  const status=document.createElement("span"); status.className="status";

  function renderFields(){
    fieldsWrap.innerHTML="";
    const page = seoState[seoActive] || (seoState[seoActive]={});
    SEO_FIELDS.forEach(f=>{
      const block=document.createElement("div"); block.style.marginBottom="1rem";
      const lab=document.createElement("label"); lab.textContent=f.l; block.appendChild(lab);
      const inp = f.type==="textarea" ? document.createElement("textarea") : document.createElement("input");
      inp.value = page[f.k]!=null ? page[f.k] : "";
      inp.addEventListener("input", ()=>{ seoState[seoActive][f.k]=inp.value; });
      block.appendChild(inp);
      const hint=document.createElement("p"); hint.className="muted"; hint.style.cssText="margin:.3rem 0 0;font-size:.82rem"; hint.textContent=f.hint;
      block.appendChild(hint);
      fieldsWrap.appendChild(block);
    });
  }
  sel.addEventListener("change", ()=>{ seoActive=sel.value; renderFields(); });
  renderFields();

  const row=document.createElement("div"); row.className="row";
  const saveBtn=document.createElement("button"); saveBtn.className="btn btn-gold"; saveBtn.textContent="Save SEO"; saveBtn.onclick=()=>saveSeo(status);
  row.append(saveBtn, status);

  card.append(h, note, lblPick, sel, fieldsWrap, row);
  return card;
}

async function saveSeo(statusEl){
  statusEl.textContent="Saving…"; statusEl.className="status";
  try{
    const r=await fetch(API,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({password:PASSWORD,type:"seo",data:seoState})});
    const j=await r.json().catch(()=>({}));
    if(r.ok&&j.ok){ statusEl.textContent="✓ "+(j.message||"Saved"); statusEl.className="status ok"; }
    else { statusEl.textContent="✕ "+(j.error||("Error "+r.status)); statusEl.className="status err"; if(r.status===401) logoutToLogin(); }
  }catch(e){ statusEl.textContent="✕ Network error"; statusEl.className="status err"; }
}

function logoutToLogin(){
  PASSWORD=""; document.getElementById("app").classList.add("hide"); document.getElementById("login").classList.remove("hide");
}

// Shrink + compress an image in the browser so large phone photos upload fast
// and the site stays light. Returns a JPEG data URL and its base64 payload.
async function compressImage(file, maxDim=1280, quality=0.82){
  const dataUrl = await new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=()=>rej(new Error("Couldn't read file")); fr.readAsDataURL(file); });
  const img = await new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=()=>rej(new Error("That file isn't an image")); im.src=dataUrl; });
  let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  if (Math.max(w,h)>maxDim){ const s=maxDim/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
  const c=document.createElement("canvas"); c.width=w; c.height=h;
  c.getContext("2d").drawImage(img,0,0,w,h);
  const out=c.toDataURL("image/jpeg", quality);
  return { dataUrl: out, base64: out.split(",")[1] };
}

// A reusable photo control: preview + Upload/Replace + Remove.
// getVal()/setVal() read & write the stored path; onChange() runs after a change.
function imageField(getVal, setVal, onChange){
  const wrap=document.createElement("div"); wrap.className="imgfield";
  const cur=getVal();
  const preview=document.createElement("img"); preview.className="imgprev"; preview.alt="";
  if (cur) preview.src="../"+cur; else preview.classList.add("hide");
  const file=document.createElement("input"); file.type="file"; file.accept="image/*"; file.className="hide";
  const choose=document.createElement("button"); choose.type="button"; choose.className="btn btn-ghost btn-sm"; choose.textContent= cur ? "Replace photo" : "Upload photo";
  const remove=document.createElement("button"); remove.type="button"; remove.className="btn btn-ghost btn-sm"; remove.textContent="Remove"; if(!cur) remove.classList.add("hide");
  const status=document.createElement("span"); status.className="status";
  choose.onclick=()=>file.click();
  remove.onclick=()=>{ setVal(""); preview.classList.add("hide"); preview.removeAttribute("src"); remove.classList.add("hide"); choose.textContent="Upload photo"; status.textContent=""; if(onChange) onChange(); };
  file.onchange=async ()=>{
    const f=file.files && file.files[0]; if(!f) return;
    status.textContent="Uploading…"; status.className="status";
    try{
      const { dataUrl, base64 } = await compressImage(f);
      preview.src=dataUrl; preview.classList.remove("hide"); // instant local preview
      const name="img-"+Date.now()+"-"+Math.random().toString(36).slice(2,7)+".jpg";
      const r=await fetch(API,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({password:PASSWORD,type:"image",name,dataBase64:base64})});
      const j=await r.json().catch(()=>({}));
      if(r.ok && j.ok && j.path){ setVal(j.path); choose.textContent="Replace photo"; remove.classList.remove("hide"); status.textContent="✓ Uploaded"; status.className="status ok"; if(onChange) onChange(); }
      else { status.textContent="✕ "+(j.error||("Error "+r.status)); status.className="status err"; if(r.status===401) logoutToLogin(); }
    }catch(e){ status.textContent="✕ "+(e.message||"Upload failed"); status.className="status err"; }
    file.value="";
  };
  const row=document.createElement("div"); row.className="row"; row.style.marginTop=".3rem";
  row.append(choose, remove, status);
  wrap.append(preview, file, row);
  return wrap;
}

async function saveImagesMap(statusEl){
  if(statusEl){ statusEl.textContent="Publishing…"; statusEl.className="status"; }
  try{
    const r=await fetch(API,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({password:PASSWORD,type:"images",data:imagesState})});
    const j=await r.json().catch(()=>({}));
    if(statusEl){ if(r.ok&&j.ok){ statusEl.textContent="✓ "+(j.message||"Saved"); statusEl.className="status ok"; } else { statusEl.textContent="✕ "+(j.error||("Error "+r.status)); statusEl.className="status err"; if(r.status===401) logoutToLogin(); } }
  }catch(e){ if(statusEl){ statusEl.textContent="✕ Network error"; statusEl.className="status err"; } }
}

function photosCard(){
  const card=document.createElement("div"); card.className="card";
  const h=document.createElement("h2"); h.textContent="Photos";
  const note=document.createElement("p"); note.className="muted"; note.style.margin="-.4rem 0 1rem";
  note.textContent="Amit's portrait on the About page. Pick a photo — it's resized automatically and goes live in about a minute.";
  const lbl=document.createElement("label"); lbl.textContent="Portrait (About page)";
  const status=document.createElement("span"); status.className="status";
  const uploader=imageField(()=>imagesState.portrait||"", v=>{ imagesState.portrait=v; }, ()=> saveImagesMap(status));
  const row=document.createElement("div"); row.className="row"; row.append(status);
  card.append(h, note, lbl, uploader, row);
  return card;
}

function entryEl(type,item,idx){
  const sc = SCHEMA[type];
  const el = document.createElement("div");
  el.className = "entry";
  const fieldsHtml = sc.fields.map(f=>{
    if (f.type==="image") return `<div data-imgfield="${f.k}" style="grid-column:1/-1"><label>${esc(f.l)}</label></div>`;
    const val = f.type==="lines" ? (Array.isArray(item[f.k])?item[f.k].join("\n"):"") : (item[f.k]||"");
    const input = (f.type==="textarea"||f.type==="lines")
      ? `<textarea data-k="${f.k}" data-lines="${f.type==="lines"?1:0}">${esc(val)}</textarea>`
      : `<input data-k="${f.k}" value="${esc(val)}" />`;
    return `<div${f.full?' style="grid-column:1/-1"':''}><label>${esc(f.l)}</label>${input}</div>`;
  }).join("");
  el.innerHTML = `<button class="rm" title="Remove">Remove</button><div class="grid2">${fieldsHtml}</div>`;
  el.querySelector(".rm").onclick = ()=>{ state[type].splice(idx,1); renderSections(); };
  sc.fields.filter(f=>f.type==="image").forEach(f=>{
    const holder = el.querySelector(`[data-imgfield="${f.k}"]`);
    if (holder) holder.appendChild(imageField(()=>item[f.k]||"", v=>{ item[f.k]=v; }, null));
  });
  el.querySelectorAll("[data-k]").forEach(inp=>{
    inp.addEventListener("input", ()=>{
      const k = inp.getAttribute("data-k");
      if (inp.getAttribute("data-lines")==="1") item[k] = inp.value.split("\n").map(s=>s.trim()).filter(Boolean);
      else item[k] = inp.value;
    });
  });
  return el;
}

async function save(type, statusEl){
  statusEl.textContent = "Saving…"; statusEl.className = "status";
  const payload = { password: PASSWORD, type, data: { [SCHEMA[type].arrayKey]: state[type] } };
  try{
    const r = await fetch(API, {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(payload)});
    const j = await r.json().catch(()=>({}));
    if (r.ok && j.ok){ statusEl.textContent = "✓ "+(j.message||"Saved"); statusEl.className="status ok"; }
    else { statusEl.textContent = "✕ "+(j.error||("Error "+r.status)); statusEl.className="status err";
      if (r.status===401){ PASSWORD=""; document.getElementById("app").classList.add("hide"); document.getElementById("login").classList.remove("hide"); }
    }
  }catch(e){ statusEl.textContent = "✕ Network error"; statusEl.className="status err"; }
}

async function doLogin(){
  const pw = document.getElementById("pw").value.trim();
  const msg = document.getElementById("loginMsg");
  const btn = document.getElementById("loginBtn");
  if (!pw){ msg.className="status err"; msg.textContent="Please enter your password."; return; }
  btn.disabled = true; msg.className="status"; msg.textContent="Checking…";
  try{
    const r = await fetch(API, {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({password:pw, type:"verify"})});
    const j = await r.json().catch(()=>({}));
    if (r.ok && j.ok){
      PASSWORD = pw; msg.textContent = "";
      document.getElementById("login").classList.add("hide");
      document.getElementById("app").classList.remove("hide");
      loadAll();
    } else if (r.status === 401){
      msg.className="status err"; msg.textContent = "Incorrect password.";
    } else {
      msg.className="status err"; msg.textContent = j.error || ("Error " + r.status);
    }
  }catch(e){
    msg.className="status err"; msg.textContent = "Network error — please try again.";
  }finally{
    btn.disabled = false;
  }
}
document.getElementById("loginBtn").onclick = doLogin;
document.getElementById("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
document.getElementById("logout").onclick = (e)=>{ e.preventDefault(); PASSWORD=""; location.reload(); };
</script>
